app = "hr-fidelity-schu"
primary_region = "iad"

[env]
  HRFIDELITY_INDEX = "designs/design-f-landing.html"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
